<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="cadastro_usuario.css">
</head>
<body>

<section class="cadastro">
    <div class="cabeca">
            <img src="img/icone/usuario2.png" alt="">
            <h3>Criar conta</h3>
            <span>Cadastra-se para começar</span>
    </div>

    <form action="">
        <div class="nome">
            <label for="nome">Nome</label>
            <div class="nome1">
                <img src="img/icone/usuario16.png" alt="nome">
                <input type="text" placeholder="Digite o seu nome">
            </div>
        </div>
        <div class="nome">
            <label for="email">Email</label>
            <div class="nome1">
                <img src="img/icone/mail.png" alt="nome">
                <input type="email" id="email" placeholder="Digite o seu email">
            </div>
        </div>
        <div class="nome">
            <label for="telefone">Telefone</label>
            <div class="nome1">
                <img src="img/icone/telephone.png" alt="nome">
                <input type="text" id="telefone" placeholder="Digite o seu número">
            </div>
        </div>
        <div class="nome">
            <label for="senha">Senha</label>
            <div class="nome1">
                <img src="img/icone/senha16.png" alt="nome">
                <input type="password" id="senha" placeholder="Digite a senha">
            </div>
        </div>
        <div class="nome">
            <label for="confirmacao_senha">Confirmação da senha</label>
            <div class="nome1">
                <img src="img/icone/senha16.png" alt="nome">
                <input type="password" id="confirmacao_senha" placeholder="Confirme a senha">
            </div>
        </div>

        <div class="criar">
            <button><a href="#">Criar conta</a></button>
            <span>Já tem uma conta?<a href="login.html">Entrar</a></span>
        </div>
    </form>

</section>

    
</body>
</html>
