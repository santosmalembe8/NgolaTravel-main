<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <section class="login">
        <div class="boas_vindas">
            <h2>Bem-vindo de Volta!</h2>
            <p>Entre na sua conta para contar planejando os melhores destinos</p>
        </div>
    
        <div class="contas">
            <div class="usuario">
                <a href="#"><img src="img/icone/usuario.png" alt="login usuario">Usuário</a>
            </div>
            <div class="empresa">
                <a href="#"><img src="img/icone/empresa.png" alt="login empresa">Empresa</a>
            </div>
        </div>
    
        <form action="">
            <div class="container_form">
                <div class="email">
                    <img src="img/icone/email.png" alt="">
                    <input type="text" placeholder="Digite o seu email">
                </div>
                <div class="senha">
                   <img src="img/icone/senha.png" alt="">
                    <input id="senha" type="text" placeholder="Digite a sua senha">
                </div>
            </div>
        </form>
    </section>



    
</body>
</html>
